name: Tests

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run authenticated integration test
        if: matrix.python-version == '3.12'
        env:
          GITFETCH_INTEGRATION_TOKEN: ${{ secrets.GITFETCH_INTEGRATION_TOKEN }}
        run: python -m unittest discover -s tests -p 'test_integration.py' -v

      - name: Smoke test CLI
        run: |
          python -m gitfetch.main --help
          python -m gitfetch.main modules list
