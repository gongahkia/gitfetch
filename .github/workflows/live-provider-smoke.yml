name: Live provider smoke tests

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install .
      - name: Test public provider fixtures
        env:
          GITFETCH_LIVE_PROVIDERS: "1"
        run: python -m unittest tests.test_live_providers -v
