name: Static analysis

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install '.[dev]'
      - run: ruff check gitfetch tests installer
      - run: mypy gitfetch
